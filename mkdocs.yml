      - Component Interaction: 02-architecture/component-interaction.md
      - Data Flow: 02-architecture/data-flow.md
  - Network Design:
      - ZeroTier Network: 03-network/zerotier-network.md
      - IP Assignment: 03-network/ip-assignment.md
      - Connectivity Matrix: 03-network/connectivity-matrix.md
  - Hardware & Resources:
      - Rack Layout: 04-hardware/rack-layout.md
      - Node Specifications: 04-hardware/node-specifications.md
      - Resource Allocation: 04-hardware/resource-allocation.md
  - Technology Stack:
      - OpenStack Design: 05-technology-stack/openstack-design.md
      - Kubernetes Design: 05-technology-stack/kubernetes-design.md
      - Monitoring Stack: 05-technology-stack/monitoring-stack.md
      - Automation Stack: 05-technology-stack/automation-stack.md
  - Deployment Guide:
      - "Phase 1: VM Setup":         "06-deployment/phase1-vm-setup.md"
      - "Phase 2: ZeroTier":         "06-deployment/phase2-zerotier.md"
